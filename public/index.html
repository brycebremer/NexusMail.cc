<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusMail Client</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%23171417"/><rect x="10" y="20" width="80" height="60" rx="8" fill="none" stroke="%23a8324a" stroke-width="6"/><polyline points="10,24 50,52 90,24" fill="none" stroke="%23a8324a" stroke-width="6" stroke-linejoin="round"/></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e0c0f;--surface:#171417;--surface2:#1e1a1c;--border:#2e272a;--text:#e8e0e2;--text2:#948a8c;--accent:#a8324a;--accent2:#8b2238;--accent-bg:rgba(168,50,74,.07);--danger:#c94057;--danger-bg:rgba(201,64,87,.1);--success:#5da87a;--warn:#d4915e;--radius:8px;--radius-sm:5px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;overflow:hidden;-webkit-font-smoothing:antialiased}*{transition:background .15s,border-color .15s,opacity .15s,color .15s,box-shadow .15s}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input,textarea,select{font-family:inherit;font-size:13px;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;outline:none;transition:border .15s}
input:focus,textarea:focus{border-color:var(--accent)}textarea{resize:vertical}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.app{display:grid;grid-template-columns:300px 3fr 2fr;grid-template-rows:50px 1fr;height:100vh}
.topbar{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px}
.sidebar{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.msglist{background:var(--surface2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.msgview{overflow-y:auto;background:var(--bg);display:flex;flex-direction:column}
.logo{font-weight:700;font-size:15px;white-space:nowrap;display:flex;align-items:center;gap:6px}.logo span{font-size:18px}
.search-wrap{flex:1;max-width:380px;position:relative}
.search-wrap input{width:100%;padding:7px 10px 7px 34px;border-radius:20px;background:var(--bg);font-size:13px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);width:15px;height:15px}
.topbar-right{display:flex;gap:4px;margin-left:auto;align-items:center}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;transition:all .15s}
.btn:hover{background:var(--surface2);transform:translateY(-1px)}.btn:active{transform:scale(.97) translateY(0)}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(168,50,74,.25)}.btn-primary:hover{background:var(--accent2);box-shadow:0 4px 12px rgba(168,50,74,.35)}
.btn-danger{color:var(--danger)}.btn-danger:hover{background:var(--danger-bg)}
.btn-sm{padding:4px 8px;font-size:12px}
.icon-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:16px}.icon-btn:hover{background:var(--surface2);opacity:1;transform:scale(1.05)}
.sidebar-section{padding:14px 14px 6px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px}
.folder{display:flex;align-items:center;gap:7px;padding:6px 14px;cursor:pointer;transition:all .12s;border-left:3px solid transparent;font-size:13px}
.folder:hover{background:var(--surface2);padding-left:18px}.folder.active{background:var(--accent-bg);border-left-color:var(--accent)}
.folder .f-icon{width:16px;text-align:center;flex-shrink:0;font-size:14px}
.folder .f-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.folder .f-badge{font-size:11px;color:var(--text2);font-weight:500}
.folder .f-badge.has-unread{background:var(--accent);color:#fff;border-radius:10px;padding:0 6px;min-width:18px;text-align:center;font-size:10px;box-shadow:0 0 6px rgba(168,50,74,.3)}
.folder-spacer{height:1px;background:var(--border);margin:8px 14px}
.sidebar-status{margin-top:auto;padding:10px 14px;border-top:1px solid var(--border);font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.dot-on{background:var(--success)}.dot-off{background:var(--danger)}
.dot-pulse{animation:pulse 2s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.list-bar{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.list-bar .title{font-weight:700;font-size:14px}.list-bar .count{font-size:12px;color:var(--text2)}
.list-bar .actions{margin-left:auto;display:flex;gap:2px}
.msg-scroll{flex:1;overflow-y:auto}
.msg-row{display:grid;grid-template-columns:22px 1fr auto;padding:10px 12px;border-bottom:1px solid rgba(42,45,62,.4);cursor:pointer;transition:background .08s;gap:2px 6px}
.msg-row:hover{background:var(--surface);transform:translateX(2px)}.msg-row.active{background:var(--accent-bg)}.msg-row.selected{background:rgba(168,50,74,.12);border-left:3px solid var(--accent)}

.msg-row.unread{border-left:3px solid var(--accent);background:rgba(168,50,74,.04)}.msg-row.unread .m-from{font-weight:700;color:#fff}.msg-row.unread .m-subj{font-weight:600;color:var(--text)}.msg-row.new-msg{border-left:3px solid #e06078;background:rgba(224,96,120,.18)!important;box-shadow:inset 0 0 30px rgba(224,96,120,.12)!important}.msg-row.new-msg .m-from{font-weight:700!important;color:#fff!important}.msg-row.new-msg .m-subj{font-weight:600!important;color:var(--text)!important}
.m-sel{grid-row:1/3;align-self:start;padding-top:2px;cursor:pointer;opacity:.4;transition:opacity .15s}.msg-row:hover .m-sel,.msg-row.selected .m-sel{opacity:1}
.m-from,.m-subj{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-meta{grid-column:3;grid-row:1/3;align-self:start;display:flex;flex-direction:column;align-items:flex-end;gap:3px;white-space:nowrap}
.m-date{font-size:11px;color:var(--text2)}.m-flags{display:flex;gap:2px;font-size:13px}
.star{cursor:pointer;transition:color .15s}.star.on{color:var(--warn)}.star:hover{opacity:.7}
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--text2);opacity:.6}
.empty-state .icon{font-size:48px;margin-bottom:4px}.empty-state p{font-size:14px}
.ev-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);animation:fadeIn .2s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ev-header h2{font-size:18px;font-weight:600;margin-bottom:10px;line-height:1.35}
.ev-meta{display:flex;flex-wrap:wrap;gap:4px 14px;font-size:12px;color:var(--text2);line-height:1.6}
.ev-meta .label{color:var(--text2);font-weight:600}.ev-meta .value{color:var(--text)}
.ev-body{flex:1;padding:18px 22px;line-height:1.7;font-size:14px;white-space:pre-wrap;word-break:break-word}
.ev-actions{padding:0 22px 14px;display:flex;gap:4px;flex-wrap:wrap}
.loading{display:flex;align-items:center;justify-content:center;flex:1;gap:8px;color:var(--text2)}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .25s ease;backdrop-filter:blur(4px)}
.overlay.show{opacity:1;pointer-events:all}
 .compose{width:780px;max-width:92vw;height:85vh;max-height:90vh;background:var(--surface);border-radius:var(--radius);display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.6);transform:scale(.95) translateY(10px);transition:transform .25s cubic-bezier(.4,0,.2,1)}.login-box{transform:scale(.95) translateY(10px);transition:transform .25s cubic-bezier(.4,0,.2,1)}.overlay.show .compose,.overlay.show .login-box{transform:scale(1) translateY(0)}
.compose-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);font-weight:600}
.compose-body{padding:14px 18px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1}
.compose-body .field{display:flex;flex-direction:column;gap:3px}
.compose-body label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.compose-body input,.compose-body textarea{width:100%}
.compose-body textarea{flex:1;min-height:340px;line-height:1.6;font-size:14px}
.compose-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.login-box{width:380px;background:var(--surface);border-radius:var(--radius);display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.login-head{padding:24px 24px 8px;text-align:center}
.login-head h1{font-size:22px;margin-bottom:4px}.login-head p{color:var(--text2);font-size:13px}
.login-body{padding:16px 24px 24px;display:flex;flex-direction:column;gap:12px}
.login-body .field{display:flex;flex-direction:column;gap:3px}
.login-body label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.login-body input{width:100%}
.toast-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:6px;align-items:center}
.toast{background:var(--surface);border:1px solid var(--border);padding:10px 18px;border-radius:var(--radius);font-size:13px;opacity:0;transform:translateY(14px);transition:all .3s cubic-bezier(.4,0,.2,1);pointer-events:none;white-space:nowrap;backdrop-filter:blur(8px)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{border-color:var(--danger);color:var(--danger)}
.toast.success{border-color:var(--success);color:var(--success)}
.sidebar-add-btn{margin-left:auto;background:none;border:1px solid var(--border);color:var(--text2);width:20px;height:20px;border-radius:4px;font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}.sidebar-add-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--accent)}
.move-picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:150;backdrop-filter:blur(4px)}
.move-picker{width:360px;max-height:70vh;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.move-picker-head{padding:14px 18px;border-bottom:1px solid var(--border);font-weight:600;display:flex;align-items:center;justify-content:space-between}
.move-picker-head button{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer}.move-picker-head button:hover{color:var(--text)}
.move-picker-list{overflow-y:auto;flex:1;padding:4px 0}
.move-picker-item{display:flex;align-items:center;gap:8px;padding:10px 18px;cursor:pointer;transition:background .12s;font-size:13px}.move-picker-item:hover{background:var(--accent-bg)}
.move-picker-foot{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
.move-picker-foot input{flex:1}
.folder-menu{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:160;min-width:180px;padding:4px 0}
.folder-menu-item{padding:8px 14px;font-size:13px;cursor:pointer;transition:background .1s}.folder-menu-item:hover{background:var(--surface2)}
.folder-menu-item.danger{color:var(--danger)}.folder-menu-item.danger:hover{background:var(--danger-bg)}
.msg-menu{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:160;min-width:200px;padding:4px 0}
.msg-menu-item{padding:8px 14px;font-size:13px;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:8px}.msg-menu-item:hover{background:var(--surface2)}
.msg-menu-item.danger{color:var(--danger)}.msg-menu-item.danger:hover{background:var(--danger-bg)}
.msg-menu-item svg{width:14px;height:14px;opacity:.6;flex-shrink:0}.msg-menu-item:hover svg{opacity:1}
.msg-menu-sep{height:1px;background:var(--border);margin:4px 14px}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div class="logo"><span style="color:#6B0F0F;font-family:Consolas,Monaco,'Courier New',monospace;font-weight:800;font-size:26px;letter-spacing:3px;margin-right:10px;text-shadow:0 0 16px rgba(168,50,74,.25)">NM</span><span style="font-family:Consolas,Monaco,'Courier New',monospace;font-weight:300;font-size:20px;letter-spacing:2px;color:var(--text2)">NexusMail.cc</span></div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" type="text" placeholder="Search mail...">
    </div>
    <div class="topbar-right">
      <button class="btn btn-primary" onclick="openCompose()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Compose</button>
      <button class="icon-btn" onclick="refreshFolder()" title="Refresh" style="opacity:0.4;font-size:22px;transition:opacity .2s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.4">↻</button>
      <button class="icon-btn" onclick="doLogout()" title="Logout" style="opacity:.4;font-size:18px;transition:opacity .2s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.4"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
  <div class="sidebar">
    <div class="sidebar-section">Folders <button class="sidebar-add-btn" onclick="createFolder()" title="New folder">+</button></div>
    <div id="folders"></div>
    <div class="sidebar-status"><div class="dot dot-off" id="connDot"></div><span id="connText">Not connected</span></div>
  </div>
  <div class="msglist">
    <div class="list-bar">
      <span class="title" id="folderTitle">Inbox</span>
      <span class="count" id="folderCount"></span>
      <div class="actions">
        <button class="icon-btn btn-sm" onclick="toggleSelectAll()" title="Select all"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></button>
        <button class="icon-btn btn-sm" onclick="markReadSelected()" title="Mark read"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7l10 7 10-7"/><rect x="2" y="5" width="20" height="14" rx="2"/></svg></button>
        <button class="icon-btn btn-sm" onclick="moveSelected()" title="Move to folder"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><polyline points="12 11 12 17"/><polyline points="9 14 12 11 15 14"/></svg></button>
        <button class="icon-btn btn-sm" onclick="deleteSelected()" title="Delete" style="color:var(--danger)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
      </div>
    </div>
    <div class="msg-scroll" id="msgScroll"></div>
  </div>
  <div class="msgview" id="msgView">
    <div class="empty-state"><div class="icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></div><p>Sign in to get started</p></div>
  </div>
</div>

<div class="overlay" id="loginOverlay" class="show">
  <div class="login-box">
    <div class="login-head">
      <h1>Sign In</h1>
      <p>Sign in to your NexusMail account</p>
    </div>
    <div class="login-body">
      <div class="field"><label>Username</label><input id="lUser" placeholder="Admin" autofocus></div>
      <div class="field"><label>Password</label><input id="lPass" type="password" placeholder="Password"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px" onclick="doLogin()">Sign In</button>
    </div>
  </div>
</div>

<div class="overlay" id="composeOverlay">
  <div class="compose">
    <div class="compose-head">New Message <button onclick="closeCompose()">✕</button></div>
    <div class="compose-body">
      <div class="field"><label>To</label><input id="cTo" placeholder="recipient@example.com"></div>
      <div class="field"><label>CC</label><input id="cCc"></div>
      <div class="field"><label>Subject</label><input id="cSubj"></div>
      <div class="field"><label>Message</label><textarea id="cBody"></textarea></div>
    </div>
    <div class="compose-foot">
      <button class="btn btn-primary" onclick="doSend()">Send</button>
      <button class="btn" onclick="closeCompose()">Discard</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>
<script src="/app.js?v=2"></script>
</body>
</html>
